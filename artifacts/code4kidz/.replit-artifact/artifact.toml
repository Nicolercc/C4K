kind = "web"
previewPath = "/"
title = "Code4Kidz"
version = "1.0.0"
id = "artifacts/code4kidz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24679

[services.development]
run = "pnpm --filter @workspace/code4kidz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code4kidz", "run", "build" ]
publicDir = "artifacts/code4kidz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24679"
BASE_PATH = "/"
